<html>
    <head>
        <title>Register</title>
    </head>
    <body>
        {% for message in messages %}
        <h2>{{message}}</h2>
        {% endfor %}
        <form action="{% url 'login' %}" method="post">
            {% csrf_token %}
            <input type="username" name="username" required><br>
            <input type="password" name="password" required><br>
            <button type="submit">Login</button>

        </form>
    </body>
</html>
