
{% extends  'theme.html' %}
{%block main%}

{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>
    <body>
        {% for message in messages %}
        <h2> {{message}} </h2>
        {% endfor %}
        <form action="{% url 'login' %}" method="post">
            {% csrf_token %}
            <input type="username" name="username" required>
            <input type="password" name="password" required>
            <button type="submit">Login</button>
        </form>
    </body>
</body>
</html>

{%endblock%}
