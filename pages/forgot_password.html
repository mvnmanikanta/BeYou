{% extends 'theme.html' %}
{% block title %}Forgot Password{% endblock %}
{% block main %}

<style>
    .forgot-wrapper {
        min-height: 70vh;
        padding-left: 12px;
        padding-right: 12px;
    }

    .forgot-box {
        width: 100%;
        max-width: 500px;
        margin-bottom: 3rem;
    }

    .forgot-form {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
    }

    @media (max-width: 991.98px) {
        .forgot-wrapper {
            margin-top: 2rem !important;
        }

        .forgot-box h2 {
            margin-bottom: 2rem !important;
        }
    }

    @media (max-width: 767.98px) {
        .forgot-wrapper {
            min-height: auto;
            margin-top: 1.5rem !important;
        }

        .forgot-box {
            max-width: 100%;
            margin-bottom: 2rem;
        }

        .forgot-box h2 {
            font-size: 1.75rem;
            margin-bottom: 1.75rem !important;
        }

        .form-label,
        .form-control,
        .btn,
        .alert {
            font-size: 0.95rem;
        }
    }

    @media (max-width: 575.98px) {
        .forgot-box h2 {
            font-size: 1.5rem;
        }

        .form-control {
            padding-top: 0.65rem;
            padding-bottom: 0.65rem;
        }

        .btn {
            padding-top: 0.65rem;
            padding-bottom: 0.65rem;
        }

        .form-label,
        .form-control,
        .btn,
        .alert {
            font-size: 0.9rem;
        }
    }
</style>

<div class="container d-flex justify-content-center align-items-center mt-5 forgot-wrapper">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 forgot-box">
        <h2 class="text-center mb-4">Forgot Password</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" class="forgot-form">
            {% csrf_token %}

            <div class="mb-3">
                <label for="phonenumber" class="form-label">Phone Number</label>
                <input
                    type="text"
                    class="form-control"
                    id="phonenumber"
                    name="phonenumber"
                    maxlength="10"
                    pattern="[0-9]{10}"
                    inputmode="numeric"
                    placeholder="Enter 10-digit phone number"
                    required
                >
            </div>

            <button type="submit" class="btn btn-dark w-100">Send OTP</button>
        </form>
    </div>
</div>

{% endblock %}
