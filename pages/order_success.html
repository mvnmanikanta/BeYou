{% load static %}

{% block main %}
<link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
<link rel="stylesheet" href="{% static 'fontawesome-free-6.6.0-web/css/all.min.css' %}">

<style>
    body {
      background-color: #f8f9fa;
      border: none;
    }

    .success-wrapper {
      min-height: 100vh;
      padding: 20px 12px;
    }

    .modal-content {
      background-color: #ffffff;
      border: 1px solid #000000;
      color: #000000;
      border: none;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      border-radius: 8px;
    }

    .icon-circle {
      width: 60px;
      height: 60px;
      background-color: #000000;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px auto;
      flex-shrink: 0;
    }

    .icon-circle .checkmark {
      font-weight: 900;
      color: white;
      font-size: 24px;
    }

    .modal-footer .btn-dark {
      background-color: #000000;
      border: #000000;
    }

    .modal-footer .continue {
      border: 1px solid black;
      background-color: #868686;
      margin-left: 10px;
    }

    /* Tablet */
    @media (max-width: 991.98px) {
      .modal-content {
        max-width: 450px;
      }
    }

    /* Mobile */
    @media (max-width: 767.98px) {
      .success-wrapper {
        min-height: auto;
        padding: 30px 15px;
      }

      .modal-content {
        max-width: 100%;
        padding: 1.5rem !important;
      }

      .modal-content h4 {
        font-size: 1.4rem;
      }

      .modal-content p {
        font-size: 0.95rem;
      }

      .modal-footer {
        flex-direction: column;
        gap: 10px;
      }

      .modal-footer .btn,
      .modal-footer .continue {
        width: 100%;
        margin-left: 0;
      }
    }

    /* Small Mobile */
    @media (max-width: 575.98px) {
      .modal-content {
        padding: 1.25rem !important;
      }

      .icon-circle {
        width: 52px;
        height: 52px;
      }

      .icon-circle .checkmark {
        font-size: 20px;
      }

      .modal-content h4 {
        font-size: 1.2rem;
      }

      .modal-content p {
        font-size: 0.9rem;
      }

      .modal-footer .btn {
        font-size: 0.95rem;
        padding: 10px 12px;
      }
    }
</style>

<div class="container d-flex justify-content-center align-items-center success-wrapper">
  <div class="modal-content text-center p-4">
    <div class="icon-circle">
      <span class="checkmark">&#10003;</span>
    </div>
    <h4>Thank you for ordering!</h4>
    <p class="mb-4">Your order has been placed successfully.</p>
    <div class="modal-footer d-flex justify-content-center">
      <a href="{% url 'myorders' %}" type="button" class="btn btn-dark">View Order</a>
      <a href="/" type="button" class="btn btn-dark continue">Continue Shopping</a>
    </div>
  </div>
</div>

{% endblock %}
