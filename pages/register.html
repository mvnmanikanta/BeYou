{% extends 'theme.html' %}
{% block title %}Register{% endblock title %}
{% block main %}

{% load static %}
<style>
    .login{
        text-decoration: none;
    }
</style>
<div class="container d-flex justify-content-center mt-5">
    <div class="col-md-4 mb-5">
        <h2 class="text-center mb-5">Create Account</h2>
        <form action="{% url 'register' %}" method="post" style="max-width: 500px; margin-bottom: 38px;">
            {% csrf_token %}
            {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
            {% endfor %}

            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="conpassword" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100">Create</button>
            <div class="mt-2">
                <p>I have an account <a href="{% url 'login' %}" class="login">Login</a></p>
            </div>
        </form>
    </div>
</div>

{% endblock %}
