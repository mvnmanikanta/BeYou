{% extends 'theme.html' %}
{% block title %}Reset Password{% endblock %}
{% block main %}

<style>
    .reset-wrapper {
        min-height: 70vh;
        padding-left: 12px;
        padding-right: 12px;
    }

    .reset-box {
        width: 100%;
        max-width: 500px;
        margin-bottom: 3rem;
    }

    .reset-form {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
    }

    @media (max-width: 991.98px) {
        .reset-wrapper {
            margin-top: 2rem !important;
        }

        .reset-box h2 {
            margin-bottom: 2rem !important;
        }
    }

    @media (max-width: 767.98px) {
        .reset-wrapper {
            min-height: auto;
            margin-top: 1.5rem !important;
        }

        .reset-box {
            max-width: 100%;
            margin-bottom: 2rem;
        }

        .reset-box h2 {
            font-size: 1.75rem;
            margin-bottom: 1.75rem !important;
        }

        .form-label,
        .form-control,
        .btn,
        .alert {
            font-size: 0.95rem;
        }
    }

    @media (max-width: 575.98px) {
        .reset-box h2 {
            font-size: 1.5rem;
        }

        .form-control {
            padding-top: 0.65rem;
            padding-bottom: 0.65rem;
        }

        .btn {
            padding-top: 0.65rem;
            padding-bottom: 0.65rem;
        }

        .form-label,
        .form-control,
        .btn,
        .alert {
            font-size: 0.9rem;
        }
    }
</style>

<div class="container d-flex justify-content-center align-items-center mt-5 reset-wrapper">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 reset-box">
        <h2 class="text-center mb-4">Reset Password</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" class="reset-form">
            {% csrf_token %}

            <div class="mb-3">
                <label for="password" class="form-label">New Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter new password"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="conpassword" class="form-label">Confirm Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="conpassword"
                    name="conpassword"
                    placeholder="Confirm new password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-dark w-100">Reset Password</button>
        </form>
    </div>
</div>

{% endblock %}
