{% extends 'theme.html' %}
{% load static %}
{% block title %}Login{% endblock title %}
{% block main %}

<style>
    .register a {
        text-decoration: none;
    }

    .register p {
        text-align: center;
        margin-bottom: 0.5rem;
    }

    .login-wrapper {
        min-height: 70vh;
        padding-left: 12px;
        padding-right: 12px;
    }

    .login-box {
        width: 100%;
        max-width: 500px;
        margin-bottom: 3rem;
    }

    .login-form {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
    }

    @media (max-width: 991.98px) {
        .login-wrapper {
            margin-top: 2rem !important;
        }

        .login-box h2 {
            margin-bottom: 2rem !important;
        }
    }

    @media (max-width: 767.98px) {
        .login-wrapper {
            min-height: auto;
            margin-top: 1.5rem !important;
        }

        .login-box {
            max-width: 100%;
            margin-bottom: 2rem;
        }

        .login-box h2 {
            font-size: 1.75rem;
            margin-bottom: 1.75rem !important;
        }

        .input-group-text,
        .form-control,
        .btn {
            font-size: 0.95rem;
        }

        .register p {
            font-size: 0.95rem;
        }
    }

    @media (max-width: 575.98px) {
        .login-box h2 {
            font-size: 1.5rem;
        }

        .input-group-text,
        .form-control {
            padding-top: 0.65rem;
            padding-bottom: 0.65rem;
        }

        .btn {
            padding-top: 0.65rem;
            padding-bottom: 0.65rem;
        }

        .register p {
            font-size: 0.9rem;
        }
    }
</style>

<div class="container d-flex justify-content-center align-items-center mt-5 login-wrapper">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4 mb-5 login-box">
        <h2 class="text-center mb-5">Login</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form action="{% url 'login' %}" method="post" class="login-form">
            {% csrf_token %}

            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-phone"></i>
                    </span>
                    <input
                        type="text"
                        name="phonenumber"
                        id="phonenumber"
                        class="form-control"
                        placeholder="Enter 10-digit phone number"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        inputmode="numeric"
                        required
                    >
                </div>
            </div>

            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        class="form-control"
                        placeholder="Enter password"
                        required>
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100">Login</button>

            <div class="register mt-3">
                <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
                <p><a href="/accounts/forgot-password/">Forgot Password?</a></p>
            </div>
        </form>
    </div>
</div>

{% endblock %}
