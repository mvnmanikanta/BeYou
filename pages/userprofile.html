{% extends 'theme.html' %}
{% load static %}
{% block title %}User Profile{% endblock %}
{% block main %}

<style>
    .profile-container {
        max-width: 800px;
        margin: 20px auto;
        padding: 30px;
    }

    .profile {
        font-size: 35px;
        font-weight: bolder;
        display: flex;
        justify-content: center;
        text-align: center;
    }

    .btn-container {
        display: flex;
        justify-content: space-between;
    }

    .btn {
        width: 120px;
        cursor: pointer;
        border: 1px solid gray;
    }

    .btn:hover {
        color: black;
        background-color: #f0f0f0;
        border-color: #ccc;
    }

    @media (max-width: 991.98px) {
        .profile-container {
            padding: 24px;
        }
    }

    @media (max-width: 767.98px) {
        .profile-container {
            padding: 18px 15px;
        }

        .profile {
            font-size: 28px;
            margin-bottom: 2rem !important;
        }

        .col-sm-8 {
            width: 100%;
        }

        .col-sm-3 {
            width: 100%;
        }

        .row.mb-3 {
            margin-bottom: 1rem !important;
        }

        .col-form-label {
            margin-bottom: 8px;
        }

        .btn-container {
            justify-content: center;
        }

        .btn-container .btn {
            width: 100%;
            max-width: 220px;
        }
    }

    @media (max-width: 575.98px) {
        .profile-container {
            padding: 15px 12px;
        }

        .profile {
            font-size: 24px;
        }

        .btn,
        .form-control,
        .col-form-label {
            font-size: 0.95rem;
        }
    }
</style>

<div class="profile-container">
    <div class="row">
        <div class="profile mt-3 mb-5">
            <p>My Profile</p>
        </div>

        <div class="col-12">
            <form method="POST">
                {% csrf_token %}

                <div class="row mb-3">
                    <label for="name" class="col-sm-3 col-form-label">User Name</label>
                    <div class="col-sm-8">
                        <input
                            type="text"
                            class="form-control"
                            id="name"
                            name="name"
                            value="{{ request.user.first_name }}"
                            placeholder="Enter your name"
                            required
                        >
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="phonenumber" class="col-sm-3 col-form-label">Phone Number</label>
                    <div class="col-sm-8">
                        <input
                            type="text"
                            class="form-control"
                            id="phonenumber"
                            value="{{ request.user.username }}"
                            readonly
                        >
                    </div>
                </div>

                <div class="btn-container mt-4 mb-5">
                    <button type="submit" class="btn btn-dark">
                        <i class="fa-solid fa-check"></i> Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
