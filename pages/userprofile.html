{% extends 'theme.html' %}
{% load static %}
{% block title %}User Profile{% endblock %}
{% block main %}

<style>
    .profile-container {
        max-width: 800px;
        margin: 20px auto;
        padding: 30px;
    }
    .profile {
        font-size: 35px;
        font-weight: bolder;
        display: flex;
        justify-content: center;
    }
    .profile-image {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    overflow: hidden;
    margin-right: 20px;
    border: 2px solid #ccc; /* Optional: Add a border */
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f0f0f0; /* Fallback for transparency */
}
.profile-image img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ensure the image fills the circle */
}

    .edit-btn {
        margin-right: 50px;
        background:none;
        margin-top: 10px;
        border: none;
    }
    .btn-container {
        display: flex;
        justify-content: space-between;
    }
    .btn{
        width: 120px;
        cursor: pointer;
        border: 1px solid gray;
    }
    .btn:hover {
        color: black;
        background-color: #f0f0f0;  /* Light gray background */
        border-color: #ccc;  /* Optional: border color */
    }
</style>

<div class="profile-container">
    <!-- Message Display -->
    {% if messages %}
        <div class="alert alert-info">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <div class="row">
        <div class="profile mt-3 mb-5">
            <p>My Profile</p>
        </div>
        <!-- Left side: Profile image and edit button -->
        <div class="col-md-3">
            <div class="profile-image">
                {% if profile.profile_image %}
                    <img src="{{ profile.profile_image.url }}" alt="Profile Image">
                {% else %}
                    <img src="{% static 'default_profile.png' %}" alt="Default Profile Image">
                {% endif %}
            </div>
            <button class="edit-btn">
                <label for="profile_image" class="btn">Edit Image</label>
            </button>
        </div>

        <!-- Right side: Form for profile update -->
        <div class="col-md-9">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row mb-3">
                    <label for="username" class="col-sm-3 col-form-label">User Name</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" id="username" name="username" value="{{ request.user.username }}" disabled>
                    </div>
                </div>
                <div class="row mb-3">
                    <label for="email" class="col-sm-3 col-form-label">Email Address</label>
                    <div class="col-sm-8">
                        <input type="email" class="form-control" id="email" name="email" value="{{ profile.email }}">
                    </div>
                </div>
            
                <div class="col-sm-8 mt-3">
                    <!-- Custom button to trigger file input -->
                    <input type="file" class="form-control d-none" id="profile_image" name="profile_image">
                </div>
            
                <div class="btn-container mt-4 mb-5">
                    <button type="submit" class="btn btn-dark"><i class="fa-solid fa-check"></i> Save</button>
                </div>
            </form>
            
        </div>
    </div>
</div>

{% endblock %}
