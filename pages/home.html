{% extends 'theme.html' %}
{% load static %}
{% block title %}Home{% endblock title %}

{% block main %}
<!-- Carousel (Image Slider) -->
<div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <a href="{% url 'product' %}">
        <img src="{% static 'banner/banner3.png' %}" class="d-block w-100" alt="banner">
      </a>
      <div class="carousel-caption d-none d-md-block">
        <h5>All Set to Reset</h5>
      </div>
    </div>
    <div class="carousel-item">
      <a href="{% url 'product' %}">
        <img src="{% static 'banner/banner2.png' %}" class="d-block w-100" alt="banner">
      </a>
    </div>
    <div class="carousel-item">
      <a href="{% url 'product' %}">
        <img src="{% static 'banner/banner1.png' %}" class="d-block w-100" alt="banner">
      </a>
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

  <!-- New drop Products Section -->
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-22">
        <div class="section-title">
          <h3 class="text-center mb-5">New Drops</h3>
        </div>
      </div>
      {% for j in products_newdrops %}
      <div class="col-md-3 col-sm-6 col-xs-6">
        <div class="product product-single">
          <a href="{% url 'productdetail' j.id %}">
            <div class="product-thumb">
              <img src="{{j.image.url}}" class="card-img-top" alt="">
            </div>
          </a>
          <div class="product-body"></div>
            <h5 class="card-title mt-2">{{j.name}}</h5>
            <p class="card-text mt-2">₹ {{j.price}}</p>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>    
  

<!-- Seasonal Favs Section -->
<div class="container mt-5">
  <div class="row">
    <div class="col-md-22">
      <div class="section-title">
        <h3 class="text-center mb-5">Seasonal Choices</h3>
      </div>
    </div>
    {% for j in products_sesion %}
    <div class="col-md-3 col-sm-6 col-xs-6 mb-5">
      <div class="product product-single">
        <a href="{% url 'productdetail' j.id %}">
          <div class="product-thumb">
            <img src="{{j.image.url}}" class="card-img-top" alt="">
          </div>
        </a>
        <div class="product-body"></div>
          <h5 class="card-title mt-2">{{j.name}}</h5>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>   
{% endblock %}
